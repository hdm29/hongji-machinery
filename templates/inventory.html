{% extends "base.html" %}
{% block content %}
<div class="container">
    <h2 class="mb-4">Our Machinery</h2>
    
    <form action="/inventory" method="get" class="mb-5">
        <div class="input-group">
            <input type="text" name="search" class="form-control" placeholder="Search machines...">
            <button class="btn btn-primary" type="submit">Search</button>
        </div>
    </form>

    <div class="row">
        {% for item in machinery %}
        <div class="col-md-4 mb-4">
            <div class="card h-100 shadow-sm">
                <img src="{{ url_for('static', filename=item.image_path) }}" class="card-img-top" alt="{{ item.name }}">
                <div class="card-body">
                    <h5 class="card-title">{{ item.name }}</h5>
                    <p class="badge bg-secondary">{{ item.category }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
